<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejercicio 6 - Galería con Flexbox</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #1a1a1a;
      color: #f0f0f0;
      padding: 30px;
    }

    h2 {
      text-align: center;
      font-size: 2em;
      margin-bottom: 8px;
      color: #f0c040;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    p.sub {
      text-align: center;
      color: #aaa;
      margin-bottom: 28px;
    }

    /* Galería con flexbox */
    .galeria {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .tarjeta {
      flex: 0 1 200px;
      background-color: #2c2c2c;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .tarjeta:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(240,192,64,0.25);
    }

    .tarjeta img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    .tarjeta .caption {
      padding: 10px;
      font-size: 0.85em;
      color: #ccc;
      text-align: center;
      background-color: #222;
      border-top: 2px solid #f0c040;
    }

    .tarjeta .caption strong {
      display: block;
      color: #f0c040;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

  <h2>Galería de Imágenes</h2>
  <p class="sub">Maquetación con Flexbox</p>

  <div class="galeria">

    <div class="tarjeta">
      <img src="https://i.pinimg.com/1200x/ff/57/d8/ff57d80430b39e1622c7dc0243f6b2f1.jpg" alt="Naturaleza">
      <div class="caption"><strong>Naturaleza</strong>Bosque</div>
    </div>

    <div class="tarjeta">
      <img src="https://i.pinimg.com/736x/5f/8b/14/5f8b145d9cca2ce63fce0742500b844b.jpg" alt="Ciudad">
      <div class="caption"><strong>Ciudad</strong>En la USA </div>
    </div>

    <div class="tarjeta">
      <img src="https://i.pinimg.com/736x/e8/06/80/e80680affff036de2007d7f505e88faf.jpg" alt="Océano">
      <div class="caption"><strong>Océano</strong>Playa al atardecer</div>
    </div>

    <div class="tarjeta">
      <img src="https://i.pinimg.com/736x/0f/25/10/0f2510d676fc17b1fed92eaf68fe70a1.jpg" alt="Montaña">
      <div class="caption"><strong>Montaña</strong>Pico nevado</div>
    </div>

    <div class="tarjeta">
      <img src="https://i.pinimg.com/736x/53/3e/67/533e675c78f2a036f3b3e2ddf7b47be4.jpg" alt="Animal">
      <div class="caption"><strong>Fauna</strong>Vida silvestre</div>
    </div>

    <div class="tarjeta">
      <img src="https://i.pinimg.com/736x/d7/7b/de/d77bdea9701fdc2fe2413c510d132452.jpg" alt="Desierto">
      <div class="caption"><strong>Desierto</strong>Duna</div>
    </div>

    <div class="tarjeta">
      <img src="https://i.pinimg.com/1200x/8b/1a/e6/8b1ae69dd36e93fa5f119bb47a34b1e6.jpg" alt="Flores">
      <div class="caption"><strong>Flores</strong>Jardín</div>
    </div>

    <div class="tarjeta">
      <img src="https://i.pinimg.com/736x/a4/24/ea/a424ea1a8f036c92e469e453c8ee0d1d.jpg" alt="Río">
      <div class="caption"><strong>Grandote</strong>Grande </div>
    </div>

    <div class="tarjeta">
      <img src="https://i.pinimg.com/1200x/53/bc/94/53bc94a973c12d7827f737140d31ecd5.jpg" alt="Cielo">
      <div class="caption"><strong>Cielo</strong>Al amanecer</div>
    </div>

    <div class="tarjeta">
      <img src="https://i.pinimg.com/736x/88/20/b1/8820b141db123c81acfdb248d6126f4b.jpg" alt="Selva">
      <div class="caption"><strong>Selva</strong> Tropical</div>
    </div>

    <div class="tarjeta">
      <img src="https://i.pinimg.com/736x/cc/52/e5/cc52e51a9bfda21eeedd48ab98090d39.jpg" alt="Lago">
      <div class="caption"><strong>Lago</strong> Sereno de chill </div>
    </div>

    <div class="tarjeta">
      <img src="https://i.pinimg.com/1200x/79/43/e9/7943e94abdf1ee73c0c0063684c433d0.jpg" alt="Costa">
      <div class="caption"><strong>Al vacio </strong> Salto de fe </div>
    </div>

  </div>

</body>
</html>
